[profile.default]
# Source files live in src/, tests in test/, scripts in script/
src     = "src"
test    = "test"
script  = "script"
out     = "out"
libs    = ["lib"]

# Pin the exact Solidity version to match the pragma in AidenAgent.sol
solc_version = "0.8.28"

# EVM version — paris is safe and widely supported; change to "cancun" if you
# need transient storage or other post-merge opcodes.
evm_version = "london"
